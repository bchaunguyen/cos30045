<!DOCTYPE html>
<html>
    <style>
body{
    margin:0;
    font-family: Arial;
}

h1{
    text-align:center;
    padding:10px;
}

svg{
    width:100vw;  
    height:100vh;   
    display:block;
}
</style>
<body>


<svg viewBox="0 0 600 400">

    <!-- Sky -->
    <rect x="0" y="0" width="600" height="200" fill="skyblue"/>

    <!-- Grass -->
    <rect x="0" y="200" width="600" height="200" fill="lightgreen"/>

    <!-- Sun -->
    <circle cx="520" cy="70" r="40" fill="yellow" stroke="orange" stroke-width="4"/>

    <!-- House Base -->
    <rect x="200" y="170" width="200" height="130" fill="lightyellow" stroke="black"/>

    <!-- Roof -->
    <polygon points="180,170 300,80 420,170" fill="brown" stroke="black"/>

	<!-- Chimney -->
    <rect x="350" y="110" width="30" height="60" fill="gray" stroke="black"/>

	<!-- Tree trunk -->
    <rect x="100" y="220" width="20" height="80" fill="sienna" stroke="black"/>

	<!-- Tree leaves -->
    <circle cx="110" cy="200" r="40" fill="green" stroke="black"/>
	<!-- WINDOWS GROUP -->
    <g fill="lightblue" stroke="black" transform="translate(240,190)">
	    <rect x="0" y="0" width="35" height="35"/>
	    <rect x="80" y="0" width="35" height="35"/> 	
    </g>
    <!-- Text -->
    <text x="230" y="50" font-size="24" fill="black">
        My Home
    </text>

</svg>

</body>
</html>
